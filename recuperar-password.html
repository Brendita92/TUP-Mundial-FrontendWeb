<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar Contraseña - Mundial 2026</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/x-icon" href="img/logo.ico" />
  </head>
  <body>
    <header class="simple-header">
      <h1>Recuperar contraseña</h1>
    </header>

    <main>
      <section class="card form-card">
        <label for="recoveryEmail">Email</label>
        <input
          type="email"
          id="recoveryEmail"
          placeholder="Ingrese su correo electrónico"
        />

        <div class="acciones form-actions">
          <button id="btnRecoverySend" class="primary-button">Enviar</button>
          <button
            type="button"
            class="btn-gray"
            onclick="window.location.href='login.html'"
          >
            Volver al Login
          </button>
        </div>

        <p id="recoveryMessage" class="recovery-message hidden">
          Si existe una cuenta asociada al correo, recibirás instrucciones para
          recuperar tu contraseña.
        </p>
      </section>
    </main>

    <div class="foot">
      <footer>Copyright &copy; 2026</footer>
    </div>

    <script>
      const btnRecoverySend = document.getElementById("btnRecoverySend");
      const recoveryMessage = document.getElementById("recoveryMessage");

      if (btnRecoverySend) {
        btnRecoverySend.addEventListener("click", () => {
          // Conectar aquí el endpoint real de recuperación de contraseña cuando exista en backend.
          if (recoveryMessage) {
            recoveryMessage.classList.remove("hidden");
          }
        });
      }
    </script>
  </body>
</html>
