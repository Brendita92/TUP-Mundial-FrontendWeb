<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compra de Ticket - Mundial 2026</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/x-icon" href="img/logo.ico" />
  </head>
  <body>
    <header class="simple-header">
      <h1>Compra de Ticket</h1>
    </header>

    <main>
      <section id="info-partido"></section>

      <section class="card form-card">
        <h3>Resumen de compra</h3>
        <div id="resumen-compra"></div>

        <div class="cantidad-line">
          <label for="cantidad">Cantidad (1 a 10)</label>
          <input type="number" id="cantidad" min="1" max="10" value="1" />
          <small id="cantidad-error" class="input-error"></small>
        </div>

        <h3>Medio de pago</h3>
        <div id="medios-pago" class="medios-pago">
          <label class="radio-line">
            <input type="radio" name="medioPago" value="tarjeta" />
            Tarjeta de crédito / débito
          </label>
          <label class="radio-line">
            <input type="radio" name="medioPago" value="transferencia" />
            Transferencia bancaria
          </label>
        </div>

        <div id="tarjeta-form" class="tarjeta-form hidden">
          <h4>Datos de la tarjeta</h4>

          <label for="tarjeta-numero">Número de tarjeta</label>
          <input
            type="text"
            id="tarjeta-numero"
            placeholder="1234 5678 9012 3456"
            maxlength="19"
          />

          <label for="tarjeta-titular">Titular</label>
          <input
            type="text"
            id="tarjeta-titular"
            placeholder="Nombre como figura en la tarjeta"
          />

          <div class="tarjeta-row">
            <div>
              <label for="tarjeta-vencimiento">Vencimiento (MM/AA)</label>
              <input
                type="text"
                id="tarjeta-vencimiento"
                placeholder="MM/AA"
                maxlength="5"
              />
            </div>
            <div>
              <label for="tarjeta-cvv">CVV</label>
              <input
                type="text"
                id="tarjeta-cvv"
                placeholder="123"
                maxlength="4"
              />
            </div>
          </div>

          <small id="tarjeta-error" class="input-error"></small>

          <button type="button" id="btnConfirmarTarjeta" class="btn-gray">
            Confirmar tarjeta
          </button>

          <p id="tarjeta-confirmada-msg" class="tarjeta-confirmada hidden">
            ✓ Tarjeta confirmada. Ahora podés confirmar la compra.
          </p>
        </div>

        <p class="total-line">Total: <strong id="total">$0</strong></p>

        <button id="btnContinuar" class="primary-button">
          Confirmar compra
        </button>
      </section>
    </main>

    <div class="foot">
      <footer>Copyright &copy; 2026</footer>
    </div>

    <script src="js/datos.js"></script>
    <script src="js/compra.js"></script>
  </body>
</html>
