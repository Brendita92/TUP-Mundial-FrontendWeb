<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compra de Ticket - Mundial 2026</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/x-icon" href="img/logo.ico" />
  </head>
  <body>
    <header class="simple-header">
      <h1>Compra de Ticket</h1>
    </header>

    <main>
      <section id="info-partido"></section>

      <section class="card form-card">
        <h3>Sector</h3>
        <div id="sectores-container"></div>

        <label for="cantidad">Cantidad</label>
        <input type="number" id="cantidad" min="1" max="6" value="2" />

        <p class="total-line">Total: <strong id="total">$0</strong></p>

        <button id="btnContinuar" class="primary-button">Confirmar compra</button>
      </section>
    </main>

    <div class="foot">
      <footer>Copyright &copy; 2026</footer>
    </div>

    <script src="js/datos.js"></script>
    <script src="js/compra.js"></script>
  </body>
</html>
